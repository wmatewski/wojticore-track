<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
<!-- Note: TopNavBar, SideNavBar, and BottomNavBar are intentionally suppressed here as this is a linear/transactional flow (Login). -->
<main class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Brand Header -->
<div class="text-center flex flex-col items-center gap-2">
<!-- Simple Logo Representation -->
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-on-primary" data-icon="link" style="font-size: 28px;">link</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Wojticore</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Zarządzaj swoimi linkami efektywnie.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-8 w-full flex flex-col gap-6">
<div class="flex flex-col gap-1">
<h2 class="font-headline-md text-headline-md text-on-surface">Zaloguj się</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Wprowadź swoje dane, aby kontynuować.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Adres email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="mail">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="email" name="email" placeholder="jan@kowalski.pl" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Hasło</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Zapomniałeś hasła?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline" data-icon="lock">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder-secondary focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-2 flex flex-col gap-4">
<button class="w-full h-[56px] bg-primary-container text-on-primary font-label-md text-label-md font-bold rounded-lg hover:bg-primary transition-colors flex items-center justify-center shadow-sm" type="submit">
                        Zaloguj się
                    </button>
<button class="w-full h-[56px] bg-transparent border border-outline-variant text-on-surface font-label-md text-label-md font-bold rounded-lg hover:bg-surface-container-low transition-colors flex items-center justify-center gap-2" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Kontynuuj z Google
                    </button>
</div>
</form>
</div>

<div class="text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Nie masz jeszcze konta? 
                <a class="font-label-md text-label-md font-bold text-primary hover:text-primary-container transition-colors" href="#">Zarejestruj się</a>
</p>
