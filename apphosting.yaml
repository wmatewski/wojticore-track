# apphosting.yaml

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 2
  memoryMiB: 1024

env:
  # Public variables
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://l.wojmatech.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_LINKS_URL
    value: "https://wojmatech.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
    value: "pk_live_Y2xlcmsud29qbWF0ZWNoLmNvbSQ"
    availability:
      - BUILD
      - RUNTIME

  # Private secrets
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: CLERK_SECRET_KEY
    secret: CLERK_SECRET_KEY
    availability:
      - BUILD
      - RUNTIME